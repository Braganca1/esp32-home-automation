# Listener MQTT nativo (ESP32 usa este)
listener 1883
protocol mqtt

# Listener WebSocket (app React Native usa este)
listener 9001
protocol websockets

# Acesso anonimo: aceitavel apenas porque o broker fica restrito a LAN
allow_anonymous true

# Mantem mensagens retidas (discovery/state) apos restart do broker
persistence true
persistence_location /mosquitto/data/

log_dest stdout
